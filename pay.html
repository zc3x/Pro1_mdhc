<!DOCTYPE html>
<html lang="ch" xmlns="http://www.w3.org/1999/html">
<head>
  <meta charset="UTF-8">
  <title>不是你真买啊？！</title>
  <link rel="stylesheet" href="css/pay.css">
</head>
<body>
  <div id = "payPage" class = "container">
    <div class="title">确认支付</div>
    <div class="price"> $100.99</div>
    <div class="item">
      <label>
        订单编号:
        <input aria-label="订单编号" type="text" value="114514" readonly>
      </label>
    </div>
    <div class="item">
      <label>支付方式</label>
      <div class = "pay-type">
        <label>
          <input type="radio" name="payType" checked>
          微信
        </label>
        <label>
          <input type="radio" name="payType" checked>
          支付宝
        </label>
      </div>
    </div>
    <div class="item">
      <label>
        支付密码：
        <input type="password" id="pwd" placeholder="请输入六位数支付密码" maxlength="6">
      </label>
    </div>
    <button id = "payBut" onclick="toPay()">立即支付</button>
    <div id = "tip">安全支付*请勿泄露密码</div>
  </div>
  <div id = "loading" class = "container loading-page">
    <p>正在处理支付，请稍候...</p>
  </div>
  <div id = "success" class = "container success-page">
    <h2>支付成功！</h2>
  </div>

  <script src="js/pay.js"></script>

</body>
</html>
